<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><title>Авторизация...</title><style>body{background:#0f1218;color:#eaf2ff;font-family:sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;font-size:16px}.msg{text-align:center;opacity:.7}</style></head><body><div class="msg">Авторизация... Окно закроется автоматически.</div><script>(()=>{try{const h=new URLSearchParams(window.location.hash.replace('#','')),t=h.get('access_token'),e=h.get('expires_in'),err=h.get('error'),s=h.get('scope')||'';if(window.opener&&!window.opener.closed)window.opener.postMessage({type:'YANDEX_OAUTH_CALLBACK',token:t||null,expiresIn:e||'0',error:err||null,scope:s},window.location.origin);}catch{if(window.opener&&!window.opener.closed)window.opener.postMessage({type:'YANDEX_OAUTH_CALLBACK',token:null,error:'callback_error'},window.location.origin);}finally{setTimeout(()=>window.close(),300);}})();</script></body></html>
