name: Generate lyrics index
on:
  push:
    branches: [main, master]
    paths: ['albums.json', 'scripts/ci/generate-lyrics-index.mjs', '.github/workflows/generate-lyrics-index.yml']
  workflow_dispatch:
  schedule: [{ cron: '0 3 * * *' }]
permissions: { contents: write }
jobs:
  gen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: node scripts/ci/generate-lyrics-index.mjs
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "CI: update lyrics index"
          branch: ${{ github.ref_name }}
          file_pattern: "data/lyrics-index-v1.json"
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com
